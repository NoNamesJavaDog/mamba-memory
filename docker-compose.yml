services:
  mamba-memory:
    build: .
    ports:
      - "8420:8420"
    volumes:
      - mamba-data:/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mamba-data:
